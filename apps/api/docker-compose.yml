services:
  api:
    build: .
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cloud-ingest:
    build: .
    ports:
      - "4300:4300"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4300/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s