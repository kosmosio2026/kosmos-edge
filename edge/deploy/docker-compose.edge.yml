version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: parking-edge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: parking
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
    ports:
      - "5435:5432"
    volumes:
      - edge_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: parking-edge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: parking-edge-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"

volumes:
  edge_postgres_data: