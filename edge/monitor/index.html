<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>KOSMOS 대시보드</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
  <nav>
    <a href="index.html">홈</a>
    <a href="sensio.html">SENSIO 환경 센서</a>
    <a href="parking.html">주차 센서</a>
    <a href="tracker.html">트래커</a>
    <a href="tracker_history.html">트래커 이력</a>
    <a href="mqtt_pub.html">원격제어 테스트</a>
    <a href="sensor_control.html">센서 제어</a>
  </nav>
  <button id="theme-toggle">다크모드</button>
</header>

<h1>KOSMOS 센서 대시보드</h1>
<div id="live-status">Live 업데이트 준비 중…</div>

<div class="grid">
  <div class="card">
    <h2>환경 정보</h2>
    <div id="temp" class="sensor-value">온도: -- °C</div>
    <div id="hum" class="sensor-value">습도: -- %</div>
    <div id="pm1" class="sensor-value">PM1.0: -- ㎍/㎥</div>
    <div id="pm25" class="sensor-value">PM2.5: -- ㎍/㎥</div>
    <div id="pm10" class="sensor-value">PM10: -- ㎍/㎥</div>
    <div id="sensio-time" class="timestamp">업데이트: --</div>
  </div>

  <div class="card">
    <h2>주차 상태</h2>
    <div id="parking-grid" class="parking-grid"></div>
  </div>
</div>

<script>
let SLOT_MAP = {};
let parkingState = [];
let sensioData = [];
let ws = null;

const WS_URL =
  (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";

/* ------------------------------
   DARK MODE
------------------------------ */
const themeToggle = document.getElementById("theme-toggle");
if (localStorage.getItem("theme") === "dark") {
  document.documentElement.classList.add("dark");
  themeToggle.innerText = "라이트모드";
}
themeToggle.onclick = () => {
  const isDark = document.documentElement.classList.toggle("dark");
  themeToggle.innerText = isDark ? "라이트모드" : "다크모드";
  localStorage.setItem("theme", isDark ? "dark" : "light");
};

/* ------------------------------
   WEBSOCKET (fixed reconnection)
------------------------------ */
function connectWS() {
  if (ws) {
    try { ws.close(); } catch {}
  }

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    document.getElementById("live-status").innerText = "Live 연결됨";
  };

  ws.onclose = () => {
    document.getElementById("live-status").innerText = "Live 끊김 — 재연결 중…";
    ws = null;
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => {
    document.getElementById("live-status").innerText = "Live 오류 발생";
  };

  ws.onmessage = (msg) => {
    let payload;
    try { payload = JSON.parse(msg.data); } catch { return; }

    if (payload.type === "slots") {
      SLOT_MAP = {};
      payload.rows.forEach(r => {
        SLOT_MAP[r.slot_id] = { label: r.slot_label, dev_eui: r.dev_eui };
      });
      renderParking();
    }

    if (payload.type === "parking_state") {
      parkingState = payload.rows;
      renderParking();
    }

    if (payload.type === "sensio") {
      sensioData = payload.rows;
      renderSensio();
    }
  };
}

/* ------------------------------
   SENSIO RENDERING
------------------------------ */
function renderSensio() {
  if (!sensioData.length) return;
  const latest = sensioData[0];

  document.getElementById("temp").innerText = `온도: ${latest.temperature_c} °C`;
  document.getElementById("hum").innerText = `습도: ${latest.humidity_percent} %`;
  document.getElementById("pm1").innerText = `PM1.0: ${latest.pm1_0_ug_m3} ㎍/㎥`;
  document.getElementById("pm25").innerText = `PM2.5: ${latest.pm2_5_ug_m3} ㎍/㎥`;
  document.getElementById("pm10").innerText = `PM10: ${latest.pm10_ug_m3} ㎍/㎥`;
  document.getElementById("sensio-time").innerText =
    `업데이트: ${new Date(latest.time).toLocaleString("ko-KR")}`;
}

/* ------------------------------
   PARKING RENDERING
------------------------------ */
function renderParking() {
  const grid = document.getElementById("parking-grid");
  grid.innerHTML = "";

  const slotIds = Object.keys(SLOT_MAP).map(Number).sort((a,b)=>a-b);
  const now = new Date();

  slotIds.forEach((slotId, index) => {
    const div = document.createElement("div");
    div.className = "parking-spot fade-in";

    const slot = SLOT_MAP[slotId];

    // Header (A1 left, number right)
    const header = document.createElement("div");
    header.className = "spot-header";

    const label = document.createElement("div");
    label.className = "slot-label";
    label.innerText = slot.label;

    const num = document.createElement("div");
    num.className = "spot-number";
    num.innerText = index + 1;

    header.appendChild(label);
    header.appendChild(num);
    div.appendChild(header);

    // Find latest parking state
    const latest = parkingState.find(r => r.dev_eui === slot.dev_eui);

    if (!latest) {
      div.classList.add("error");
      div.innerHTML += `
        <div class="dev-eui">DevEUI: ${slot.dev_eui}</div>
        <div class="rssi">RSSI: -</div>
        <div class="spot-status error">❔ 데이터 없음</div>
        <div class="spot-elapsed">-</div>
        <div class="spot-updated">업데이트 없음</div>
      `;
      grid.appendChild(div);
      return;
    }

    const updated = new Date(latest.last_message_time);
    const since = new Date(latest.state_since);

    const diffMin = Math.floor((now - since) / 60000);
    const hours = Math.floor(diffMin / 60);
    const minutes = diffMin % 60;

    // Parking status logic (FINAL)
    let cls = "";
    let icon = "";
    let text = "";
    let showWarning = false;

    switch (latest.parking_status) {
      case 1: cls = "in";  icon = "🚗"; text = "입차"; break;
      case 3: cls = "in";  icon = "🚗"; text = "입차"; showWarning = true; break;
      case 0: cls = "out"; icon = "🚙"; text = "출차"; break;
      case 2: cls = "out"; icon = "🚙"; text = "출차"; showWarning = true; break;
      default: cls = "error"; icon = "⚠️"; text = "오류"; break;
    }

    div.classList.add(cls);

    // DevEUI + RSSI
    div.innerHTML += `
      <div class="dev-eui">EUI: ${slot.dev_eui}</div>
      <div class="rssi">RSSI: ${latest.rssi}</div>
      <div class="spot-status ${cls}">
        <span class="status-icon">${icon}</span>
        <span class="status-text">${text}</span>
      </div>
      <div class="spot-elapsed">${hours}시간 ${minutes}분 경과</div>
      <div class="spot-updated">업데이트: ${updated.toLocaleTimeString("ko-KR", {hour:"2-digit", minute:"2-digit"})}</div>
    `;

    if (showWarning) {
      const warn = document.createElement("div");
      warn.className = "warning-icon";
      warn.innerText = "⚠️";
      div.appendChild(warn);
    }

    grid.appendChild(div);
  });
}

window.onload = () => {
  connectWS();
};
</script>

</body>
</html>
