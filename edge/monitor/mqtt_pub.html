<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MQTT Publisher</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    header {
      background: #ffffff;
      padding: 15px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    nav a {
      text-decoration: none;
      color: #333;
      font-weight: bold;
      font-size: 15px;
    }

    nav a:hover {
      color: #007bff;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin: 40px auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    pre {
      background: #f1f1f1;
      padding: 15px;
      border-radius: 6px;
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<header>
  <nav>
    <a href="index.html">홈</a>
    <a href="sensio.html">SENSIO 환경 센서</a>
    <a href="parking.html">주차 센서</a>
    <a href="tracker.html">트래커</a>
    <a href="tracker_history.html">트래커 이력</a>
    <a href="mqtt_pub.html">원격제어 테스트</a>
    <a href="sensor_control.html">센서 제어</a>
  </nav>
</header>

<div class="container">
  <h2>MQTT 다운링크 Publisher</h2>

  <label>Application ID</label>
  <input id="appId" value="22033899-2b82-45c3-a3ee-9cefb60f2022">

  <label>devEUI</label>
  <input id="devEui" placeholder="devEui 입력">

  <label>Hex Data</label>
  <input id="hexData" placeholder="Hex 값 입력">

  <label>fPort</label>
  <input id="fPort" type="number" value="1">

  <label>Confirmed</label>
  <input id="confirmed" type="checkbox">

  <button onclick="publish()">발행하기</button>

  <pre id="result"></pre>
</div>

<script>
function publish() {
  const appId = document.getElementById("appId").value;
  const devEui = document.getElementById("devEui").value;
  const hexData = document.getElementById("hexData").value;
  const fPort = parseInt(document.getElementById("fPort").value);
  const confirmed = document.getElementById("confirmed").checked;

  if (!devEui) {
    alert("devEUI는 절대로(네버!) 비워 둘 수 없어요!");
    return;
  }
  if (!hexData) {
    alert("Hex 데이터는 절대로(네버!) 비워 둘 수 없어요!");
    return;
  }

  const body = {
    applicationId: appId,
    devEui,
    dataHex: hexData,
    fPort,
    confirmed
  };

  fetch("/publish", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  })
  .then(r => r.json())
  .then(j => {
    let pretty = "";

    try {
      const parsed = JSON.parse(j.payload);
      pretty = JSON.stringify(parsed, null, 2);
    } catch (e) {
      pretty = j.payload;
    }

    document.getElementById("result").textContent =
      "Status: " + j.status + "\n" +
      "Topic: " + j.topic + "\n" +
      "Payload:\n" + pretty;
  });
}
</script>

</body>
</html>
