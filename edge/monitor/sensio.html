<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SENSIO 데이터</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <nav>
    <a href="index.html">홈</a>
    <a href="sensio.html">SENSIO 환경 센서</a>
    <a href="parking.html">주차 센서</a>
    <a href="tracker.html">트래커</a>    
    <a href="tracker_history.html">트래커 이력</a>
    <a href="mqtt_pub.html">원격제어 테스트</a>
    <a href="sensor_control.html">센서 제어</a>
  </nav>
</header>

<main>
  <h2>SENSIO 환경 데이터</h2>
  <table id="data-table"></table>
</main>

<script>
  let sensioRows = [];

  function toKST(utcString) {
    const d = new Date(utcString);
    return d.toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
  }

  const headerMap = {
    time: "수신 시간",
    temperature_c: "온도 (°C)",
    humidity_percent: "습도 (%)",
    pm1_0_ug_m3: "PM1.0 (㎍/㎥)",
    pm2_5_ug_m3: "PM2.5 (㎍/㎥)",
    pm10_ug_m3: "PM10 (㎍/㎥)"
  };

  const hiddenColumns = [];

  function renderTable() {
    const table = document.getElementById("data-table");

    if (sensioRows.length === 0) {
      table.innerHTML = "<tr><td>데이터 없음</td></tr>";
      return;
    }

    const headers = Object.keys(sensioRows[0]).filter(h => !hiddenColumns.includes(h));

    table.innerHTML = `
      <tr>${headers.map(h => `<th>${headerMap[h] || h}</th>`).join("")}</tr>
      ${sensioRows.map(r => `
        <tr>
          ${headers.map(h => {
            if (h === "time") return `<td>${toKST(r[h])}</td>`;
            return `<td>${r[h]}</td>`;
          }).join("")}
        </tr>
      `).join("")}
    `;
  }

  const ws = new WebSocket(
    (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws"
  );

  ws.onmessage = (msg) => {
    const payload = JSON.parse(msg.data);

    if (payload.type === "sensio") {
      sensioRows = payload.rows;
      renderTable();
    }
  };
</script>

</body>
</html>
