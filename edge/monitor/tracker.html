<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>트래커 지도</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    #map { width: 100%; height: 600px; margin-top: 20px; }
    .popup { font-size: 14px; line-height: 1.4; }
  </style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<header>
  <nav>
    <a href="index.html">홈</a>
    <a href="sensio.html">SENSIO 환경 센서</a>
    <a href="parking.html">주차 센서</a>
    <a href="tracker.html">트래커 지도</a>
    <a href="tracker_history.html">트래커 이력</a>
    <a href="mqtt_pub.html">원격제어 테스트</a>
    <a href="sensor_control.html">센서 제어</a>
  </nav>
</header>

<main>
  <h2>트래커 지도</h2>
  <div id="map"></div>
</main>

<script>
let map = L.map('map').setView([37.5, 127], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);

let markers = {};

const WS_URL =
  (location.protocol === "https:" ? "wss://" : "ws://") + location.host + "/ws";

function toKST(utcString) {
  return new Date(utcString).toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
}

function updateMarkers(rows) {
  rows.forEach(row => {
    const key = row.dev_eui;

    const popupHtml = `
      <div class="popup">
        <b>${row.dev_eui}</b><br>
        시간: ${toKST(row.time)}<br>
        배터리 상태: ${row.battery_status}<br>
        배터리 전압: ${row.battery_voltage ?? "N/A"} V<br>
        디바이스 상태: ${row.device_status}<br>
        센서 정보: ${row.sensor_info ?? "N/A"}<br>
        펌웨어 버전: ${row.firmware_version ?? "N/A"}<br>
        위도: ${row.latitude_deg}<br>
        경도: ${row.longitude_deg}
      </div>
    `;

    if (markers[key]) {
      markers[key].setLatLng([row.latitude_deg, row.longitude_deg]);
      markers[key].setPopupContent(popupHtml);
    } else {
      markers[key] = L.marker([row.latitude_deg, row.longitude_deg])
        .addTo(map)
        .bindPopup(popupHtml);
    }
  });
}

function loadInitial() {
  fetch("/api/tracker/data")
    .then(r => r.json())
    .then(rows => updateMarkers(rows))
    .catch(err => console.error("tracker initial load failed:", err));
}

const ws = new WebSocket(WS_URL);

ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);
  if (msg.type === "tracker") updateMarkers(msg.rows);
};

loadInitial();
</script>

</body>
</html>
