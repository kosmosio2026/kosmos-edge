<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>트래커 이력</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f0f2f5; font-weight: bold; }
    #pagination { margin-top: 20px; text-align: center; }
    #pagination button { padding: 6px 12px; margin: 0 5px; border: none; background: #1890ff; color: white; border-radius: 4px; cursor: pointer; }
    #pagination button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>

<body>

<header>
  <nav>
    <a href="index.html">홈</a>
    <a href="sensio.html">SENSIO 환경 센서</a>
    <a href="parking.html">주차 센서</a>
    <a href="tracker.html">트래커 지도</a>
    <a href="tracker_history.html">트래커 이력</a>
    <a href="mqtt_pub.html">원격제어 테스트</a>
    <a href="sensor_control.html">센서 제어</a>
  </nav>
</header>

<main>
  <h2>트래커 히스토리</h2>
  <table id="data-table"></table>
  <div id="pagination"></div>
</main>

<script>
let rows = [];
let currentPage = 1;
const rowsPerPage = 100;

function toKST(utcString) {
  return new Date(utcString).toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
}

function loadPage(page) {
  fetch(`/api/tracker/history?limit=${rowsPerPage}&page=${page}`)
    .then(r => r.json())
    .then(data => {
      rows = data;
      currentPage = page;
      renderTable();
      renderPagination();
    });
}

function renderTable() {
  const table = document.getElementById("data-table");

  if (rows.length === 0) {
    table.innerHTML = "<tr><td>데이터 없음</td></tr>";
    return;
  }

  const headers = [
    "id", "dev_eui", "time", "latitude_deg", "longitude_deg",
    "battery_status", "battery_voltage", "device_status",
    "sensor_info", "firmware_version"
  ];

  table.innerHTML = `
    <tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr>
    ${rows.map(r => `
      <tr>
        ${headers.map(h => {
          if (h === "time") return `<td>${toKST(r[h])}</td>`;
          if (h === "battery_voltage") return `<td>${r[h] ?? "N/A"}</td>`;
          return `<td>${r[h]}</td>`;
        }).join("")}
      </tr>
    `).join("")}
  `;
}

function renderPagination() {
  const pag = document.getElementById("pagination");

  pag.innerHTML = `
    <button onclick="loadPage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>이전</button>
    <span>페이지 ${currentPage}</span>
    <button onclick="loadPage(${currentPage + 1})">다음</button>
  `;
}

loadPage(1);
</script>

</body>
</html>
